<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .title {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 2rem;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .input-section input {
      flex: 1;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
      transition: 0.3s;
    }

    .input-section input:focus {
      border-color: #667eea;
    }

    .add-btn {
      padding: 15px 22px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }

    .add-btn:hover {
      background: #5a67d8;
      transform: scale(1.05);
    }

    .todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      margin-bottom: 12px;
      background: #f7f7f7;
      border-radius: 12px;
      transition: 0.3s;
    }

    .todo-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .delete-btn {
      border: none;
      background: #ff4d4d;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .delete-btn:hover {
      background: #e63946;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      .input-section {
        flex-direction: column;
      }

      .add-btn {
        width: 100%;
      }
    }
  </style>
  <script src="./script.js" defer></script>
</head>
<body>

  <div class="container">
    <h1 class="title">📝 My Todo List</h1>

    <div class="input-section">
      <input type="text" id="todoInput" placeholder="Enter a new task...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>

    <!-- Your JS will dynamically add li items here -->
    <ul class="todo-list" id="todoList">
    </ul>

    <div class="footer">
      Practice JS by adding functionality ✨
    </div>
  </div>

</body>
</html>
