<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --ink-light: #4a4a6a;
      --ink-muted: #9090b0;
      --surface: #f7f5f0;
      --card: #ffffff;
      --accent: #e63946;
      --accent-soft: #fce8ea;
      --accent2: #457b9d;
      --accent2-soft: #dceef7;
      --check: #2d9c68;
      --check-soft: #d4f0e3;
      --border: rgba(26,26,46,0.08);
      --border-strong: rgba(26,26,46,0.16);
      --shadow-sm: 0 2px 8px rgba(26,26,46,0.06);
      --shadow-md: 0 8px 32px rgba(26,26,46,0.10);
      --shadow-lg: 0 20px 60px rgba(26,26,46,0.14);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "DM Sans", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px 80px;
      background-color: var(--surface);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(69,123,157,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(230,57,70,0.06) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='rgba(26,26,46,0.04)'/%3E%3C/svg%3E");
    }

    /* ─── MAIN CARD ─── */
    .container {
      width: 100%;
      max-width: 540px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ─── HEADER BAND ─── */
    .container::before {
      content: '';
      display: block;
      height: 5px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
    }

    /* ─── INNER PADDING ─── */
    .container > * {
      padding-left: 32px;
      padding-right: 32px;
    }

    /* ─── TITLE ─── */
    .title {
      padding-top: 32px;
      padding-bottom: 8px;
      font-family: "DM Serif Display", serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .container .title + .input-section {
      margin-top: 20px;
    }

    /* ─── INPUT SECTION ─── */
    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 0;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .input-section input {
      flex: 1;
      padding: 13px 16px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-size: 0.97rem;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-section input::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .input-section input:focus {
      border-color: var(--accent2);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(69,123,157,0.12);
    }

    .add-btn {
      padding: 13px 22px;
      border: none;
      background: var(--ink);
      color: #fff;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.93rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      font-family: "DM Sans", sans-serif;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .add-btn:hover {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(230,57,70,0.28);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    /* ─── TODO LIST ─── */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-top: 16px;
      padding-bottom: 8px;
    }

    /* ─── TASK ITEM ─── */
    .todo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.18s;
      border-radius: 0;
      box-shadow: none;
      animation: slideIn 0.25s cubic-bezier(0.34,1.26,0.64,1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background: transparent;
      transform: none;
      box-shadow: none;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
      transform: translateX(0);
    }

    /* ─── LEFT TASK AREA ─── */
    .task {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    /* ─── CHECKBOX ─── */
    .task input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      min-width: 20px;
      border: 1.5px solid var(--border-strong);
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .task input[type="checkbox"]:checked {
      background: var(--check);
      border-color: var(--check);
    }

    .task input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 9px;
      height: 5px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg);
    }

    .task input[type="checkbox"]:hover:not(:checked) {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(69,123,157,0.12);
    }

    /* ─── TEXT ─── */
    .task span {
      font-size: 0.97rem;
      color: var(--ink);
      font-weight: 400;
      transition: color 0.25s, opacity 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
      line-height: 1.5;
    }

    /* ─── COMPLETED TASK ─── */
    .completed {
      text-decoration: line-through;
      color: var(--ink-muted) !important;
      opacity: 0.55 !important;
    }

    /* ─── DELETE BUTTON ─── */
    .delete-btn {
      border: 1.5px solid transparent;
      background: transparent;
      color: var(--ink-muted);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: "DM Sans", sans-serif;
      letter-spacing: 0.03em;
      transition: all 0.2s;
      opacity: 0;
      transform: translateX(4px);
      white-space: nowrap;
    }

    .delete-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(230,57,70,0.2);
      transform: translateX(0) !important;
    }

    /* ─── FOOTER ─── */
    .footer {
      padding-top: 16px;
      padding-bottom: 28px;
      text-align: left;
      color: var(--ink-muted);
      font-size: 0.80rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--check);
      flex-shrink: 0;
    }

    /* ─── EMPTY STATE ─── */
    .todo-list:empty::after {
      content: 'No tasks yet — add one above';
      display: block;
      text-align: center;
      color: var(--ink-muted);
      font-size: 0.88rem;
      padding: 32px 0 24px;
      font-style: italic;
      font-family: "DM Serif Display", serif;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 500px) {
      .container > * {
        padding-left: 20px;
        padding-right: 20px;
      }

      .input-section {
        flex-direction: column;
      }

      .add-btn {
        width: 100%;
      }

      .delete-btn {
        opacity: 1;
        transform: translateX(0);
      }

      .task span {
        max-width: 180px;
      }
    }
  </style>
  <script src="./script.js" defer></script>
</head>
<body>

  <div class="container">
    <h1 class="title">📝 My Todo List</h1>

    <div class="input-section">
      <input type="text" id="todoInput" placeholder="Enter a new task...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>

    <ul class="todo-list" id="todoList">
    </ul>

    <div class="footer">
      Practice JS by adding functionality ✨
    </div>
  </div>

</body>
</html>
